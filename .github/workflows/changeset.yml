name: Changeset PR

# When pushes land on main with pending changesets, this opens (or
# updates) a "Version Packages" PR that bumps package.json + writes
# CHANGELOG.md. Merging that PR creates a git tag, which triggers the
# release.yml workflow to publish to npm.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # IMPORTANT: pass the PAT to checkout too. Without this, git
          # operations (the version-bump commit + the release tag push)
          # use the auto-generated GITHUB_TOKEN — which means pushes are
          # attributed to github-actions[bot] and GitHub's anti-loop
          # protection suppresses any downstream workflows. With the PAT
          # here, pushes are attributed to the PAT's owner, so CI on the
          # version PR and release.yml on the tag both fire normally.
          token: ${{ secrets.CHANGESETS_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        # Version comes from package.json `packageManager` field.
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create version PR or push tag
        uses: changesets/action@v1
        with:
          # `version` runs `changeset version`, which applies pending
          # changesets to package.json + CHANGELOG.md and commits them.
          version: pnpm changeset version
          # When the version PR merges, this command runs. It creates
          # the git tag, which release.yml watches and publishes.
          publish: pnpm changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # CHANGESETS_PAT is a fine-grained PAT with contents:write and
          # pull-requests:write on this repo. Falls back to GITHUB_TOKEN
          # so the workflow doesn't hard-fail if the secret is missing —
          # but tags pushed by GITHUB_TOKEN do NOT trigger release.yml
          # (GitHub anti-loop), so set the PAT secret to make releases
          # fully automated. See CONTRIBUTING.md.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT || secrets.GITHUB_TOKEN }}
